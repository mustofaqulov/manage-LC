<!DOCTYPE html>
<html>
<head>
    <title>Token Debug</title>
</head>
<body>
    <h1>Token Debug Tool</h1>
    <button onclick="checkToken()">Check Token</button>
    <pre id="output"></pre>

    <script>
        function checkToken() {
            const token = localStorage.getItem('auth_token');
            const userData = localStorage.getItem('user_data');

            const output = document.getElementById('output');
            output.textContent = `
Token: ${token ? 'EXISTS' : 'NOT FOUND'}
Token Length: ${token ? token.length : 0}
Token Value: ${token || 'N/A'}

User Data: ${userData || 'NOT FOUND'}

Parsed User:
${userData ? JSON.stringify(JSON.parse(userData), null, 2) : 'N/A'}
            `;
        }
    </script>
</body>
</html>
